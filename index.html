<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1"/>
<title>Snake Game</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1020;overflow:hidden;font-family:'Segoe UI',Arial,sans-serif;user-select:none;-webkit-user-select:none}
canvas{display:block;position:fixed;top:0;left:0}
.sc{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200}
.sc.hide{display:none}

#sStart{background:radial-gradient(ellipse at 50% 38%,#0d2244 0%,#060b18 100%)}
.logo{font-size:clamp(54px,11vw,110px);font-weight:900;letter-spacing:3px;
  background:linear-gradient(160deg,#ffdd00 0%,#ff6600 40%,#ff0066 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 40px #ff660088);margin-bottom:6px;
  animation:logoPulse 2.5s ease-in-out infinite}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 30px #ff660066)}50%{filter:drop-shadow(0 0 72px #ff6600cc)}}
.tagline{color:#7799bb;font-size:15px;letter-spacing:9px;text-transform:uppercase;margin-bottom:48px}
.sf{display:flex;flex-direction:column;align-items:center;gap:14px;width:310px}
.sf label{color:#6688aa;font-size:11px;letter-spacing:3px;text-transform:uppercase;align-self:flex-start}
.sf input{width:100%;padding:13px 18px;background:rgba(255,255,255,.06);
  border:1.5px solid rgba(255,165,0,.35);border-radius:10px;color:#fff;font-size:17px;outline:none;
  transition:border-color .2s,box-shadow .2s}
.sf input:focus{border-color:#ffaa00;box-shadow:0 0 20px rgba(255,170,0,.25)}
.cpick{display:flex;gap:9px;align-self:flex-start;flex-wrap:wrap}
.csw{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;
  transition:transform .15s,border-color .15s;box-shadow:0 0 10px currentColor}
.csw:hover{transform:scale(1.25)}
.csw.on{border-color:#fff;transform:scale(1.25)}
.pbtn{width:100%;padding:17px;border:none;border-radius:11px;
  background:linear-gradient(135deg,#ffcc00,#ff6600);color:#000;
  font-size:21px;font-weight:900;letter-spacing:3px;text-transform:uppercase;
  cursor:pointer;margin-top:6px;transition:transform .15s,box-shadow .15s}
.pbtn:hover{transform:translateY(-3px);box-shadow:0 10px 36px rgba(255,150,0,.55)}
.pbtn:active{transform:translateY(0)}
.hs{color:#334455;font-size:12px;margin-top:18px;letter-spacing:1px}
.hs b{color:#ffaa00}

#sOver{background:rgba(4,8,20,.96)}
.ot{font-size:clamp(40px,8vw,76px);font-weight:900;
  background:linear-gradient(135deg,#ff3355,#ff6600);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:4px;text-transform:uppercase;margin-bottom:6px;
  animation:shake .35s ease-out}
@keyframes shake{0%{transform:translateX(-12px)}25%{transform:translateX(12px)}50%{transform:translateX(-7px)}75%{transform:translateX(7px)}100%{transform:translateX(0)}}
.ostats{display:flex;gap:20px;margin:26px 0;flex-wrap:wrap;justify-content:center}
.ocard{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:13px;padding:15px 22px;text-align:center;min-width:95px}
.ocl{color:#445566;font-size:10px;letter-spacing:3px;text-transform:uppercase}
.ocv{color:#eee;font-size:30px;font-weight:900;margin-top:3px}
.ocause{color:#5577aa;font-size:14px;margin-bottom:26px}
.brow{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{padding:13px 30px;border:1.5px solid rgba(255,255,255,.15);border-radius:9px;
  background:rgba(255,255,255,.06);color:#ddd;font-size:14px;font-weight:700;
  letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3);transform:translateY(-2px)}
.btn:active{transform:translateY(0)}
.btn.pri{background:linear-gradient(135deg,#ffcc00,#ff6600);border:none;color:#000}
.btn.pri:hover{box-shadow:0 6px 25px rgba(255,160,0,.4)}

#sPause{background:rgba(4,8,20,.9);backdrop-filter:blur(8px)}
.pt{font-size:58px;font-weight:900;color:#ffcc00;letter-spacing:6px;text-transform:uppercase;margin-bottom:34px}
.pmenu{display:flex;flex-direction:column;gap:13px;min-width:230px}

#hud{position:fixed;inset:0;pointer-events:none;z-index:15}
#scorePill{position:absolute;top:14px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.65);backdrop-filter:blur(5px);
  border:1px solid rgba(255,200,0,.2);border-radius:50px;
  padding:8px 28px;display:flex;align-items:center;gap:16px;white-space:nowrap}
.sp-label{color:#887755;font-size:11px;letter-spacing:2px;text-transform:uppercase}
.sp-val{color:#ffdd00;font-size:26px;font-weight:900;line-height:1}
.sp-rank{color:#ff9900;font-size:13px;font-weight:700}
#pInfo{position:absolute;top:14px;left:14px;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px 15px;min-width:175px}
.pi-name{color:#fff;font-size:14px;font-weight:700;margin-bottom:3px}
.pi-len{color:#667788;font-size:11px;margin-bottom:7px}
.bbar{height:7px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.bbar-fill{height:100%;background:linear-gradient(90deg,#ff6600,#ffcc00);border-radius:4px;transition:width .1s}
.bbar-label{color:#886644;font-size:10px;margin-bottom:3px;letter-spacing:1px}
#puHud{position:absolute;top:14px;left:198px;display:flex;flex-direction:column;gap:7px}
.pu-pill{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.65);border-radius:8px;padding:5px 11px;border:1px solid rgba(255,255,255,.1)}
.pu-ico{font-size:16px}
.pu-nm{color:#eee;font-size:11px;font-weight:700}
.pu-bar{width:70px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;margin-top:2px}
.pu-fill{height:100%;border-radius:2px;transition:width .15s}
#lb{position:absolute;top:14px;right:14px;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:11px;min-width:155px}
.lb-hd{color:#334455;font-size:10px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;text-align:center}
.lb-row{display:flex;align-items:center;gap:6px;padding:3px 3px;border-radius:5px;font-size:12px}
.lb-row.me{background:rgba(255,200,0,.12)}
.lb-n{color:#445;font-weight:800;min-width:16px;font-size:11px}
.lb-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.lb-nm{color:#bbc;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:75px}
.lb-sc{color:#8899aa;font-weight:800;font-size:11px}
#mm{position:absolute;bottom:14px;right:14px;width:155px;height:155px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,255,255,.15);background:#060a14}
#mmcv{width:155px;height:155px}
#killfeed{position:absolute;bottom:14px;left:14px;display:flex;flex-direction:column;gap:5px}
.kf-item{background:rgba(0,0,0,.65);border-radius:6px;padding:4px 10px;color:#aab;font-size:11px;opacity:1;transition:opacity .5s}
.kf-item.fade{opacity:0}
.hint{position:absolute;bottom:178px;right:14px;color:rgba(255,255,255,.2);font-size:10px;text-align:right;line-height:2}
</style>
</head>
<body>

<div id="sStart" class="sc">
  <div class="logo">SNAKE GAME</div>
  <div class="tagline">Eat &bull; Grow &bull; Dominate</div>
  <div class="sf">
    <label>Your Name</label>
    <input id="nameIn" value="Amit" maxlength="14" autocomplete="off" spellcheck="false"/>
    <label>Worm Color</label>
    <div class="cpick" id="cpick"></div>
    <button class="pbtn" id="btnPlay">&#9654;&nbsp; PLAY</button>
  </div>
  <div class="hs">Best Score: <b id="hsVal">0</b></div>
</div>

<div id="sOver" class="sc hide">
  <div class="ot">GAME OVER</div>
  <div class="ostats">
    <div class="ocard"><div class="ocl">Score</div><div class="ocv" id="ovScore">0</div></div>
    <div class="ocard"><div class="ocl">Length</div><div class="ocv" id="ovLen">0</div></div>
    <div class="ocard"><div class="ocl">Rank</div><div class="ocv" id="ovRank">#1</div></div>
  </div>
  <div class="ocause" id="ovCause">Eliminated</div>
  <div class="brow">
    <button class="btn pri" id="btnAgain">Play Again</button>
    <button class="btn" id="btnMenu">Main Menu</button>
  </div>
</div>

<div id="sPause" class="sc hide">
  <div class="pt">PAUSED</div>
  <div class="pmenu">
    <button class="btn pri" id="btnResume">Resume</button>
    <button class="btn" id="btnRestart">Restart</button>
    <button class="btn" id="btnBack">Main Menu</button>
  </div>
</div>

<div id="hud" class="hide">
  <div id="scorePill">
    <span class="sp-label">SCORE</span>
    <span class="sp-val" id="hudScore">0</span>
    <span class="sp-rank" id="hudRank">#1</span>
  </div>
  <div id="pInfo">
    <div class="pi-name" id="hudName">Player</div>
    <div class="pi-len" id="hudLen">Length: 5</div>
    <div class="bbar-label">BOOST</div>
    <div class="bbar"><div class="bbar-fill" id="hudBoost" style="width:100%"></div></div>
  </div>
  <div id="puHud"></div>
  <div id="lb"><div class="lb-hd">Leaderboard</div><div id="lbList"></div></div>
  <div id="mm"><canvas id="mmcv" width="155" height="155"></canvas></div>
  <div class="hint">Mouse — steer<br>Hold LMB — boost<br>Esc — pause</div>
  <div id="killfeed"></div>
</div>

<canvas id="cv"></canvas>

<script>
'use strict';
// ═══════════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════════
const CFG = {
  ARENA: 3200,
  BOTS: 14,
  BASE_SPD: 2.9,
  BOOST_SPD: 5.6,
  BOOST_DRAIN: 0.4,
  BOOST_REGEN: 0.15,
  MAX_BOOST: 100,
  TURN_SPD: 0.075,
  SEG_GAP: 8,
  HEAD_R: 16,
  SEG_R: 13,
  MIN_SEGS: 6,
  FOOD_TOTAL: 900,
  BONUS_COUNT: 30,
  PU_COUNT: 8,
  FOOD_R: 5,
  BONUS_R: 11,
  PU_R: 15,
  CELL: 100,
  CAM_EASE: 0.09,
  ZOOM_BASE: 1.0,
  BNAMES: ['Zigzag','Slimy','Viper','Chomper','Coily','Noodle','Cobra',
           'Twister','Fang','Mamba','Hydra','Wraith','Adder','Taipan',
           'Python','Krait','Boa','Asp','Slither','Venom'],
  PALETTES: [
    { h:'#22ee88', t:'#116633', g:'#22ee88', s:'stripe' },
    { h:'#11ccff', t:'#0044aa', g:'#11ccff', s:'dot' },
    { h:'#ff3366', t:'#880033', g:'#ff3366', s:'checker' },
    { h:'#ffcc00', t:'#886600', g:'#ffdd44', s:'stripe' },
    { h:'#ff6600', t:'#882200', g:'#ff8833', s:'solid' },
    { h:'#bb44ff', t:'#660099', g:'#cc66ff', s:'dot' },
    { h:'#ff44cc', t:'#880055', g:'#ff66dd', s:'stripe' },
    { h:'#44ffee', t:'#007766', g:'#66ffee', s:'checker' },
    { h:'#ff4444', t:'#990000', g:'#ff6666', s:'solid' },
    { h:'#88ff00', t:'#336600', g:'#aaff00', s:'dot' },
    { h:'#ff8800', t:'#883300', g:'#ffaa33', s:'stripe' },
    { h:'#00ccee', t:'#004466', g:'#33ddff', s:'checker' },
  ],
  PU_TYPES: ['magnet','ghost','double','speed','shield'],
  PU_EMOJI: { magnet:'🧲', ghost:'👻', double:'✖', speed:'⚡', shield:'🛡' },
  PU_NAME:  { magnet:'Magnet', ghost:'Ghost Mode', double:'2× Score', speed:'Speed Boost', shield:'Shield' },
  PU_COLOR: { magnet:'#ff88ff', ghost:'#88ffff', double:'#ffcc00', speed:'#ff8800', shield:'#4488ff' },
  PU_DUR:   { magnet:5000, ghost:3500, double:8000, speed:5000, shield:7000 },
  FOOD_SHAPES: ['orb','orb','orb','orb','star','star','gem','ring','orb','orb'],
};

// ═══════════════════════════════════════════════════════════
// SPATIAL GRID
// ═══════════════════════════════════════════════════════════
class Grid {
  constructor(){ this.c={}; }
  _k(x,y){ return ((x/CFG.CELL)|0)+','+(((y/CFG.CELL)|0)); }
  clear(){ this.c={}; }
  put(x,y,v){ const k=this._k(x,y); (this.c[k]||(this.c[k]=[])).push(v); }
  query(x,y,r){
    const out=[],s=CFG.CELL,x0=(x-r)/s|0,x1=(x+r)/s|0,y0=(y-r)/s|0,y1=(y+r)/s|0;
    for(let cx=x0;cx<=x1;cx++) for(let cy=y0;cy<=y1;cy++){
      const a=this.c[cx+','+cy]; if(a) for(const v of a) out.push(v);
    }
    return out;
  }
}

// ═══════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════
const rnd   = (a,b) => a+Math.random()*(b-a);
const rndI  = (a,b) => (rnd(a,b+1))|0;
const d2    = (ax,ay,bx,by) => (ax-bx)**2+(ay-by)**2;
const ang   = (ax,ay,bx,by) => Math.atan2(by-ay,bx-ax);
const clamp = (v,lo,hi) => v<lo?lo:v>hi?hi:v;
function lerpA(a,b,t){
  let d=b-a; while(d>Math.PI)d-=Math.PI*2; while(d<-Math.PI)d+=Math.PI*2;
  return a+d*t;
}
function randPt(){
  const half=CFG.ARENA/2, r=Math.random()*(half-250), a=Math.random()*Math.PI*2;
  return { x:CFG.ARENA/2+Math.cos(a)*r, y:CFG.ARENA/2+Math.sin(a)*r };
}
// hex to hsl with lightness adjustment
function hsl(hex,lAdj){
  hex=hex.replace('#','');
  const r=parseInt(hex.substr(0,2),16)/255,g=parseInt(hex.substr(2,2),16)/255,b=parseInt(hex.substr(4,2),16)/255;
  const mx=Math.max(r,g,b),mn=Math.min(r,g,b),l=(mx+mn)/2;
  const s=mx===mn?0:l>.5?(mx-mn)/(2-mx-mn):(mx-mn)/(mx+mn);
  const h=mx===mn?0:mx===r?((g-b)/(mx-mn)+6)%6*60:mx===g?(b-r)/(mx-mn)*60+120:(r-g)/(mx-mn)*60+240;
  return `hsl(${Math.round(h)},${Math.round(s*100)}%,${clamp(Math.round(l*100)+(lAdj||0),5,95)}%)`;
}
// darken a hex color (returns hsl string)
function darken(hex,amt){ return hsl(hex,-(amt||20)); }
function lighten(hex,amt){ return hsl(hex,+(amt||20)); }

// ═══════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════
let G = {};
function resetState(){
  G = {
    phase:'start', player:null, bots:[],
    food:[], bonuses:[], powerups:[],
    particles:[],
    shake:0,
    camX:CFG.ARENA/2, camY:CFG.ARENA/2, zoom:1,
    score:0, hs:+localStorage.getItem('wz2_hs')||0,
    pColor:CFG.PALETTES[0], pName:'Amit',
    frame:0, lastT:0, dt:16,
    bgrid:new Grid(), fgrid:new Grid(),
    t:0,
  };
}
resetState();

// ═══════════════════════════════════════════════════════════
// CANVAS
// ═══════════════════════════════════════════════════════════
const cv  = document.getElementById('cv');
const ctx = cv.getContext('2d');
const mmc = document.getElementById('mmcv');
const mmx = mmc.getContext('2d');
function resize(){ cv.width=innerWidth; cv.height=innerHeight; }
resize(); addEventListener('resize',resize);

// ═══════════════════════════════════════════════════════════
// INPUT
// ═══════════════════════════════════════════════════════════
const inp = { mx:innerWidth/2, my:innerHeight/2, boost:false };
cv.addEventListener('mousemove',e=>{ inp.mx=e.clientX; inp.my=e.clientY; });
cv.addEventListener('mousedown',e=>{ if(!e.button) inp.boost=true; });
cv.addEventListener('mouseup',  e=>{ if(!e.button) inp.boost=false; });
cv.addEventListener('contextmenu',e=>e.preventDefault());
cv.addEventListener('touchstart',e=>{ e.preventDefault(); inp.mx=e.touches[0].clientX; inp.my=e.touches[0].clientY; inp.boost=true; },{passive:false});
cv.addEventListener('touchmove', e=>{ e.preventDefault(); inp.mx=e.touches[0].clientX; inp.my=e.touches[0].clientY; },{passive:false});
cv.addEventListener('touchend', ()=>inp.boost=false);
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'&&G.phase==='playing') pause();
  else if(e.key==='Escape'&&G.phase==='paused') resume();
});

// ═══════════════════════════════════════════════════════════
// FOOD FACTORIES
// ═══════════════════════════════════════════════════════════
function mkFood(x,y){
  const p=(x!=null)?{x,y}:randPt();
  const tier=Math.random()<.7?0:Math.random()<.7?1:2;
  const sizes=[CFG.FOOD_R, CFG.FOOD_R*1.6, CFG.FOOD_R*2.3];
  const vals=[1,2,5];
  const hue=rndI(0,360);
  const shape=CFG.FOOD_SHAPES[rndI(0,CFG.FOOD_SHAPES.length-1)];
  return { x:p.x, y:p.y, r:sizes[tier], value:vals[tier],
           color:`hsl(${hue},90%,58%)`,
           light:`hsl(${hue},100%,80%)`,
           glow:`hsl(${hue},100%,65%)`,
           pulse:Math.random()*Math.PI*2, shape, rot:Math.random()*Math.PI };
}
function mkBonus(){
  const p=randPt(), hue=rndI(20,60);
  return { x:p.x, y:p.y, r:CFG.BONUS_R, value:10, dead:false,
           color:`hsl(${hue},100%,58%)`, light:`hsl(${hue},100%,82%)`,
           glow:`hsl(${hue},100%,70%)`, pulse:Math.random()*Math.PI*2, shape:'star' };
}
function mkPU(type){
  const p=randPt(), t=type||CFG.PU_TYPES[rndI(0,CFG.PU_TYPES.length-1)];
  return { x:p.x, y:p.y, r:CFG.PU_R, type:t, pulse:Math.random()*Math.PI*2, dead:false };
}
function initWorld(){
  G.food=[]; G.bonuses=[]; G.powerups=[];
  for(let i=0;i<CFG.FOOD_TOTAL;i++) G.food.push(mkFood());
  for(let i=0;i<CFG.BONUS_COUNT;i++) G.bonuses.push(mkBonus());
  for(let i=0;i<CFG.PU_COUNT;i++) G.powerups.push(mkPU());
}

// ═══════════════════════════════════════════════════════════
// WORM FACTORY
// ═══════════════════════════════════════════════════════════
function mkWorm(name,pal,isPlayer){
  const p=randPt(), dir=Math.random()*Math.PI*2;
  const segs=[];
  for(let i=0;i<12;i++) segs.push({ x:p.x-Math.cos(dir)*i*CFG.SEG_GAP, y:p.y-Math.sin(dir)*i*CFG.SEG_GAP });
  return {
    name, pal, isPlayer,
    segs, dir, tdir:dir,
    boostE:CFG.MAX_BOOST, boosting:false,
    alive:true, score:0,
    pups:{}, grow:0,
    aiTimer:0, aiState:'wander',
    colHead:pal.h, colTail:pal.t, colGlow:pal.g,
    skin: pal.s || 'solid',
    skinOffset: Math.random()*40,
    tongueT:0, tongueOut:0,
  };
}
const H = w => w.segs[0];
const L = w => w.segs.length;

// ═══════════════════════════════════════════════════════════
// AI
// ═══════════════════════════════════════════════════════════
function aiStep(bot,dt){
  const h=H(bot), cx=CFG.ARENA/2, m=220;
  bot.aiTimer-=dt;
  if(h.x<m||h.x>CFG.ARENA-m||h.y<m||h.y>CFG.ARENA-m){
    bot.tdir=ang(h.x,h.y,cx,cx); bot.aiTimer=900; bot.aiState='wall'; return;
  }
  if(bot.aiTimer>0) return;
  let bf=null, bd=220;
  for(const f of G.food){ const dv=d2(h.x,h.y,f.x,f.y); if(dv<bd*bd){bd=Math.sqrt(dv);bf=f;} }
  for(const b of G.bonuses){ if(b.dead)continue; const dv=d2(h.x,h.y,b.x,b.y); if(dv<(bd*1.6)**2){bd=Math.sqrt(dv)*.6;bf=b;} }
  if(bf){ bot.tdir=ang(h.x,h.y,bf.x,bf.y); bot.boosting=bd<90&&Math.random()<.35; bot.aiTimer=300; return; }
  let prey=null, pd=400;
  for(const w of [G.player,...G.bots]){
    if(!w||!w.alive||w===bot||L(w)>=L(bot)*.85) continue;
    const d=Math.sqrt(d2(h.x,h.y,H(w).x,H(w).y));
    if(d<pd){ pd=d; prey=w; }
  }
  if(prey){ bot.tdir=ang(h.x,h.y,H(prey).x,H(prey).y); bot.boosting=pd<220; bot.aiTimer=220; return; }
  for(const w of [G.player,...G.bots]){
    if(!w||!w.alive||w===bot||L(w)<L(bot)*1.25) continue;
    const d=Math.sqrt(d2(h.x,h.y,H(w).x,H(w).y));
    if(d<200){ bot.tdir=ang(H(w).x,H(w).y,h.x,h.y); bot.boosting=true; bot.aiTimer=450; return; }
  }
  bot.tdir+=rnd(-.85,.85); bot.aiTimer=rnd(600,1600); bot.boosting=false;
}

// ═══════════════════════════════════════════════════════════
// PHYSICS
// ═══════════════════════════════════════════════════════════
function tickWorm(w,dt){
  if(!w.alive) return;
  const h=H(w);
  w.dir=lerpA(w.dir,w.tdir,CFG.TURN_SPD*dt/16);
  const now=Date.now(), hasSpd=w.pups.speed&&now<w.pups.speed.end;
  let sp=CFG.BASE_SPD*(hasSpd?1.55:1);
  if(w.boosting&&w.boostE>0){
    sp=CFG.BOOST_SPD*(hasSpd?1.4:1);
    w.boostE-=CFG.BOOST_DRAIN*dt/16;
    if(w.boostE<=0){w.boostE=0;w.boosting=false;}
    if(w.segs.length>CFG.MIN_SEGS&&Math.random()<.18){
      const tail=w.segs.pop();
      G.food.push(mkFood(tail.x+rnd(-8,8),tail.y+rnd(-8,8)));
      if(G.food.length>CFG.FOOD_TOTAL*1.6) G.food.splice(0,G.food.length-CFG.FOOD_TOTAL);
    }
    if(w.isPlayer) emitP(h.x,h.y,w.colGlow,2,1.8);
  } else {
    w.boostE=Math.min(CFG.MAX_BOOST,w.boostE+CFG.BOOST_REGEN*dt/16);
  }
  if(w.isPlayer&&w.pups.magnet&&Date.now()<w.pups.magnet.end){
    for(const f of G.food){
      const dx=h.x-f.x, dy=h.y-f.y, dd=Math.sqrt(dx*dx+dy*dy);
      if(dd<210&&dd>1){ f.x+=dx/dd*3.5; f.y+=dy/dd*3.5; }
    }
  }
  // Tongue animation
  w.tongueT+=dt*.004;
  w.tongueOut=Math.sin(w.tongueT*2.5)*.5+.5;
  w.segs.unshift({ x:h.x+Math.cos(w.dir)*sp, y:h.y+Math.sin(w.dir)*sp });
  if(w.grow>0) w.grow--; else w.segs.pop();
}

// ═══════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════
function emitP(x,y,col,n,spd){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, v=spd*(0.5+Math.random());
    G.particles.push({x,y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,
      r:1.5+Math.random()*3,life:1,decay:.025+Math.random()*.04,color:col});
  }
}

// ═══════════════════════════════════════════════════════════
// COLLISIONS
// ═══════════════════════════════════════════════════════════
function collide(){
  const bg=G.bgrid, fg=G.fgrid;
  bg.clear(); fg.clear();
  const all=[G.player,...G.bots].filter(w=>w&&w.alive);
  for(const w of all) for(let i=1;i<w.segs.length;i++) bg.put(w.segs[i].x,w.segs[i].y,{w,i});
  for(const f of G.food) fg.put(f.x,f.y,f);
  const now=Date.now();
  for(const w of all){
    if(!w.alive) continue;
    const h=H(w), hr=CFG.HEAD_R;
    const ghost=w.pups.ghost&&now<w.pups.ghost.end;
    const shield=w.pups.shield&&now<w.pups.shield.end;
    if(h.x<20||h.x>CFG.ARENA-20||h.y<20||h.y>CFG.ARENA-20){
      killWorm(w,'Hit the wall'); continue;
    }
    if(!ghost&&!shield){
      for(const {w:ow,i} of bg.query(h.x,h.y,hr+CFG.SEG_R+6)){
        if(ow===w) continue;
        if(d2(h.x,h.y,ow.segs[i].x,ow.segs[i].y)<(hr+CFG.SEG_R-3)**2){
          killWorm(w,`Eaten by ${ow.name}`); break;
        }
      }
    }
    if(!w.alive) continue;
    const hasX2=w.pups.double&&now<w.pups.double.end;
    for(const f of fg.query(h.x,h.y,hr+CFG.FOOD_R*2.5+4)){
      if(d2(h.x,h.y,f.x,f.y)<(hr+f.r)**2){
        const val=f.value*(hasX2?2:1);
        w.score+=val; w.grow+=f.value;
        if(w.isPlayer){ G.score+=val; emitP(f.x,f.y,f.color,5,1.8); }
        const idx=G.food.indexOf(f);
        if(idx!==-1){ G.food.splice(idx,1); G.food.push(mkFood()); }
      }
    }
    for(const b of G.bonuses){
      if(b.dead) continue;
      if(d2(h.x,h.y,b.x,b.y)<(hr+b.r)**2){
        const val=b.value*(hasX2?2:1);
        w.score+=val; w.grow+=b.value;
        if(w.isPlayer){ G.score+=val; emitP(b.x,b.y,b.glow,15,3); }
        b.dead=true;
        setTimeout(()=>{ b.dead=false; const p=randPt(); b.x=p.x; b.y=p.y; b.pulse=Math.random()*Math.PI*2; },10000);
      }
    }
    if(w.isPlayer){
      for(const pu of G.powerups){
        if(pu.dead) continue;
        if(d2(h.x,h.y,pu.x,pu.y)<(hr+pu.r)**2){
          const dur=CFG.PU_DUR[pu.type];
          w.pups[pu.type]={end:now+dur,total:dur};
          pu.dead=true;
          emitP(pu.x,pu.y,CFG.PU_COLOR[pu.type],20,4);
          setTimeout(()=>{
            if(G.phase!=='playing') return;
            pu.dead=false; const p=randPt(); pu.x=p.x; pu.y=p.y;
            pu.type=CFG.PU_TYPES[rndI(0,CFG.PU_TYPES.length-1)];
          },22000);
        }
      }
    }
  }
}

function killWorm(w,cause){
  if(!w.alive) return;
  w.alive=false;
  for(const s of w.segs){
    G.food.push(mkFood(s.x+rnd(-10,10),s.y+rnd(-10,10)));
    emitP(s.x,s.y,w.colHead,3,3.5);
  }
  if(G.food.length>CFG.FOOD_TOTAL*1.8) G.food.splice(0,G.food.length-CFG.FOOD_TOTAL);
  if(w.isPlayer){
    G.shake=28; G.deathCause=cause; setTimeout(endGame,700);
  } else {
    if(cause.startsWith('Eaten by ')){
      const killer=cause.replace('Eaten by ','');
      if(killer===G.pName) addKillfeed(`You eliminated ${w.name}`,'#ffdd44');
      else addKillfeed(`${killer} eliminated ${w.name}`,'#aabbcc');
    }
    const idx=G.bots.indexOf(w);
    if(idx!==-1) setTimeout(()=>{
      if(G.phase!=='playing') return;
      G.bots[idx]=mkWorm(CFG.BNAMES[rndI(0,CFG.BNAMES.length-1)],
        CFG.PALETTES[rndI(0,CFG.PALETTES.length-1)],false);
    },3500);
  }
}
function addKillfeed(msg,color){
  const d=document.createElement('div');
  d.className='kf-item'; d.style.color=color||'#aab'; d.textContent=msg;
  document.getElementById('killfeed').prepend(d);
  setTimeout(()=>d.classList.add('fade'),3500);
  setTimeout(()=>d.remove(),4200);
  const kf=document.getElementById('killfeed');
  while(kf.children.length>4) kf.lastChild.remove();
}

// ═══════════════════════════════════════════════════════════
// CAMERA
// ═══════════════════════════════════════════════════════════
function updateCam(){
  if(!G.player||!G.player.alive) return;
  const h=H(G.player), len=L(G.player);
  const tz=clamp(1/(1+len*.0025),0.32,1.05);
  G.camX+=(h.x-G.camX)*CFG.CAM_EASE;
  G.camY+=(h.y-G.camY)*CFG.CAM_EASE;
  G.zoom+=(tz-G.zoom)*.05;
}
function w2s(wx,wy){
  const cx=cv.width/2, cy=cv.height/2;
  let sx=(wx-G.camX)*G.zoom+cx, sy=(wy-G.camY)*G.zoom+cy;
  if(G.shake>0){ sx+=(Math.random()-.5)*G.shake*.7; sy+=(Math.random()-.5)*G.shake*.7; }
  return {x:sx,y:sy};
}
function s2w(sx,sy){
  return {x:(sx-cv.width/2)/G.zoom+G.camX,y:(sy-cv.height/2)/G.zoom+G.camY};
}
function vis(wx,wy,m){ const p=w2s(wx,wy); m=m||80; return p.x>-m&&p.x<cv.width+m&&p.y>-m&&p.y<cv.height+m; }

// ═══════════════════════════════════════════════════════════
// BACKGROUND — hex grid
// ═══════════════════════════════════════════════════════════
function drawBg(){
  ctx.fillStyle='#0a1020';
  ctx.fillRect(0,0,cv.width,cv.height);

  // Hex grid
  const tl=s2w(0,0), br=s2w(cv.width,cv.height);
  const R=52, W=R*2, H2=Math.sqrt(3)*R;
  const x0=Math.floor(tl.x/W)*W, y0=Math.floor(tl.y/H2)*H2;
  ctx.strokeStyle='rgba(100,160,255,0.045)';
  ctx.lineWidth=1;
  for(let row=0;row<Math.ceil((br.y-tl.y)/H2)+2;row++){
    for(let col=0;col<Math.ceil((br.x-tl.x)/W)+2;col++){
      const wx=x0+col*W+(row%2)*R;
      const wy=y0+row*H2;
      if(wx<-W||wx>CFG.ARENA+W||wy<-H2||wy>CFG.ARENA+H2) continue;
      const p=w2s(wx,wy);
      ctx.beginPath();
      for(let i=0;i<6;i++){
        const a=Math.PI/6+i*Math.PI/3;
        const rx=p.x+Math.cos(a)*R*G.zoom, ry=p.y+Math.sin(a)*R*G.zoom;
        i===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
      }
      ctx.closePath(); ctx.stroke();
    }
  }

  // Arena border — layered glow effect
  const C0=w2s(0,0),C1=w2s(CFG.ARENA,0),C2=w2s(CFG.ARENA,CFG.ARENA),C3=w2s(0,CFG.ARENA);
  const walls=[[`rgba(255,60,60,0.04)`,60*G.zoom],[`rgba(255,50,50,0.55)`,3*G.zoom],[`rgba(255,110,110,0.9)`,1.5*G.zoom]];
  for(const [col,lw] of walls){
    ctx.beginPath();
    ctx.moveTo(C0.x,C0.y); ctx.lineTo(C1.x,C1.y); ctx.lineTo(C2.x,C2.y); ctx.lineTo(C3.x,C3.y); ctx.closePath();
    ctx.strokeStyle=col; ctx.lineWidth=lw; ctx.stroke();
  }
}

// ═══════════════════════════════════════════════════════════
// FOOD SHAPES
// ═══════════════════════════════════════════════════════════
function pathStar(cx,cy,r,points,inner){
  ctx.beginPath();
  for(let i=0;i<points*2;i++){
    const rad=(i%2===0)?r:inner||r*.4;
    const a=Math.PI/points*i-Math.PI/2;
    i===0?ctx.moveTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad):ctx.lineTo(cx+Math.cos(a)*rad,cy+Math.sin(a)*rad);
  }
  ctx.closePath();
}
function pathGem(cx,cy,r,rot){
  ctx.beginPath();
  const pts=[[0,-r],[r*.6,-r*.3],[r*.6,r*.4],[0,r],[-r*.6,r*.4],[-r*.6,-r*.3]];
  for(let i=0;i<pts.length;i++){
    const x=pts[i][0]*Math.cos(rot)-pts[i][1]*Math.sin(rot);
    const y=pts[i][0]*Math.sin(rot)+pts[i][1]*Math.cos(rot);
    i===0?ctx.moveTo(cx+x,cy+y):ctx.lineTo(cx+x,cy+y);
  }
  ctx.closePath();
}
function pathRing(cx,cy,r){
  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2); ctx.arc(cx,cy,r*.5,0,Math.PI*2,true);
}

function drawFoodItem(px,py,r,f,glow,color,light,rot){
  ctx.shadowBlur=r*3; ctx.shadowColor=glow||color;
  switch(f.shape||'orb'){
    case 'star':
      // Glow behind star
      ctx.fillStyle=glow||color;
      ctx.globalAlpha=0.22;
      ctx.beginPath(); ctx.arc(px,py,r*1.5,0,Math.PI*2); ctx.fill();
      ctx.globalAlpha=1;
      // Star body
      const sg=ctx.createRadialGradient(px,py,0,px,py,r);
      sg.addColorStop(0,light||'#fff'); sg.addColorStop(0.5,color); sg.addColorStop(1,glow||color);
      ctx.fillStyle=sg;
      pathStar(px,py,r,5,r*.42);
      ctx.fill();
      break;
    case 'gem':
      ctx.fillStyle=color;
      try { pathGem(px,py,r,rot||0); } catch(e){ ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); }
      const gg=ctx.createLinearGradient(px,py-r,px,py+r);
      gg.addColorStop(0,light||'#fff'); gg.addColorStop(0.4,color); gg.addColorStop(1,glow||color);
      ctx.fillStyle=gg; ctx.fill();
      break;
    case 'ring':
      ctx.strokeStyle=color; ctx.lineWidth=r*.5;
      ctx.shadowBlur=r*4; ctx.shadowColor=glow||color;
      ctx.beginPath(); ctx.arc(px,py,r*.75,0,Math.PI*2); ctx.stroke();
      // Inner dot
      ctx.fillStyle=light||'#fff';
      ctx.beginPath(); ctx.arc(px,py,r*.22,0,Math.PI*2); ctx.fill();
      break;
    default: // orb
      const og=ctx.createRadialGradient(px-r*.35,py-r*.35,0,px,py,r);
      og.addColorStop(0,'#fff'); og.addColorStop(0.25,light||'#fff'); og.addColorStop(0.6,color); og.addColorStop(1,'transparent');
      ctx.fillStyle=og;
      ctx.beginPath(); ctx.arc(px,py,r,0,Math.PI*2); ctx.fill();
      break;
  }
}

// ═══════════════════════════════════════════════════════════
// DRAW FOOD
// ═══════════════════════════════════════════════════════════
function drawFood(){
  for(const f of G.food){
    if(!vis(f.x,f.y,22)) continue;
    f.pulse+=.06; f.rot=(f.rot||0)+.02;
    const p=w2s(f.x,f.y);
    const r=f.r*(1+Math.sin(f.pulse)*.1)*G.zoom;
    drawFoodItem(p.x,p.y,r,f,f.glow,f.color,f.light,f.rot);
  }
  ctx.shadowBlur=0;

  // Bonus orbs
  for(const b of G.bonuses){
    if(b.dead||!vis(b.x,b.y,28)) continue;
    b.pulse+=.045;
    const p=w2s(b.x,b.y);
    const r=b.r*(1+Math.sin(b.pulse)*.2)*G.zoom;
    ctx.shadowBlur=25; ctx.shadowColor=b.glow;
    const bg=ctx.createRadialGradient(p.x-r*.3,p.y-r*.3,0,p.x,p.y,r);
    bg.addColorStop(0,'#fff'); bg.addColorStop(.25,b.light||b.color); bg.addColorStop(.6,b.color); bg.addColorStop(1,'transparent');
    ctx.fillStyle=bg;
    pathStar(p.x,p.y,r,8,r*.55); ctx.fill();
    // Outer ring
    ctx.strokeStyle=b.color; ctx.lineWidth=1.5*G.zoom;
    ctx.globalAlpha=0.55;
    ctx.beginPath(); ctx.arc(p.x,p.y,r*1.4,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1;
  }
  ctx.shadowBlur=0;

  // Power-ups
  for(const pu of G.powerups){
    if(pu.dead||!vis(pu.x,pu.y,38)) continue;
    pu.pulse+=.07;
    const p=w2s(pu.x,pu.y);
    const r=pu.r*G.zoom;
    const beat=0.88+Math.sin(pu.pulse*2)*.12;
    const col=CFG.PU_COLOR[pu.type];
    ctx.shadowBlur=28; ctx.shadowColor=col;
    // Outer ring
    ctx.strokeStyle=col; ctx.lineWidth=2*G.zoom; ctx.globalAlpha=0.4+Math.sin(pu.pulse*3)*.3;
    ctx.beginPath(); ctx.arc(p.x,p.y,r*1.9*beat,0,Math.PI*2); ctx.stroke();
    ctx.globalAlpha=1; ctx.shadowBlur=0;
    // Main body
    const pg=ctx.createRadialGradient(p.x-r*.3,p.y-r*.3,0,p.x,p.y,r);
    pg.addColorStop(0,lighten(col,30)); pg.addColorStop(0.6,col); pg.addColorStop(1,darken(col,20));
    ctx.fillStyle=pg;
    ctx.beginPath(); ctx.arc(p.x,p.y,r*beat,0,Math.PI*2); ctx.fill();
    if(G.zoom>.4){
      ctx.font=`${r*.95}px serif`; ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#fff'; ctx.fillText(CFG.PU_EMOJI[pu.type],p.x,p.y+1);
    }
    ctx.shadowBlur=0;
  }
}

// ═══════════════════════════════════════════════════════════
// DRAW WORM BODY PATH (smooth bezier)
// ═══════════════════════════════════════════════════════════
function buildBodyPath(segs,z){
  if(segs.length<2) return;
  const p0=w2s(segs[0].x,segs[0].y);
  ctx.moveTo(p0.x,p0.y);
  for(let i=1;i<segs.length-1;i++){
    const p1=w2s(segs[i].x,segs[i].y);
    const p2=w2s(segs[i+1].x,segs[i+1].y);
    ctx.quadraticCurveTo(p1.x,p1.y,(p1.x+p2.x)/2,(p1.y+p2.y)/2);
  }
  const last=w2s(segs[segs.length-1].x,segs[segs.length-1].y);
  ctx.lineTo(last.x,last.y);
}

// ═══════════════════════════════════════════════════════════
// DRAW WORM
// ═══════════════════════════════════════════════════════════
function drawWorm(w){
  if(!w.alive||w.segs.length<3) return;
  const now=Date.now();
  const ghost=w.pups.ghost&&now<w.pups.ghost?.end;
  const shield=w.pups.shield&&now<w.pups.shield?.end;
  const z=G.zoom;
  const bodyR=CFG.SEG_R*z;
  const headR=CFG.HEAD_R*z;
  ctx.globalAlpha=ghost?0.38:1;

  // ── BODY ──
  // 1. Shadow/glow
  ctx.save();
  ctx.shadowBlur=bodyR*1.8; ctx.shadowColor=w.colGlow;
  ctx.strokeStyle=w.colGlow;
  ctx.lineWidth=bodyR*1.8; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.globalAlpha=(ghost?0.15:0.22);
  ctx.beginPath(); buildBodyPath(w.segs,z); ctx.stroke();
  ctx.restore();

  ctx.globalAlpha=ghost?0.38:1;

  // 2. Dark outline
  ctx.strokeStyle=darken(w.colHead,30);
  ctx.lineWidth=bodyR*2+3*z; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); buildBodyPath(w.segs,z); ctx.stroke();

  // 3. Main body fill - gradient by creating a fill from head color to tail color
  const hpt=w2s(w.segs[0].x,w.segs[0].y);
  const tpt=w2s(w.segs[w.segs.length-1].x,w.segs[w.segs.length-1].y);
  const bodyGrad=ctx.createLinearGradient(hpt.x,hpt.y,tpt.x,tpt.y);
  bodyGrad.addColorStop(0,w.colHead);
  bodyGrad.addColorStop(0.45,w.colHead);
  bodyGrad.addColorStop(1,w.colTail);
  ctx.strokeStyle=bodyGrad;
  ctx.lineWidth=bodyR*2; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); buildBodyPath(w.segs,z); ctx.stroke();

  // 4. Skin pattern
  if(w.skin==='stripe'){
    ctx.setLineDash([CFG.SEG_GAP*z*2, CFG.SEG_GAP*z*1.5]);
    ctx.lineDashOffset=w.skinOffset;
    ctx.strokeStyle='rgba(0,0,0,0.18)';
    ctx.lineWidth=bodyR*1.8; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); buildBodyPath(w.segs,z); ctx.stroke();
    ctx.setLineDash([]);
  } else if(w.skin==='dot'){
    // Draw dots along body
    for(let i=3;i<w.segs.length;i+=5){
      if(!vis(w.segs[i].x,w.segs[i].y,bodyR+4)) continue;
      const dp=w2s(w.segs[i].x,w.segs[i].y);
      ctx.fillStyle='rgba(0,0,0,0.22)';
      ctx.beginPath(); ctx.arc(dp.x,dp.y,bodyR*.38,0,Math.PI*2); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.08)';
      ctx.beginPath(); ctx.arc(dp.x-bodyR*.1,dp.y-bodyR*.1,bodyR*.18,0,Math.PI*2); ctx.fill();
    }
  } else if(w.skin==='checker'){
    ctx.setLineDash([CFG.SEG_GAP*z*1.8, CFG.SEG_GAP*z*1.8]);
    ctx.lineDashOffset=0;
    ctx.strokeStyle='rgba(255,255,255,0.12)';
    ctx.lineWidth=bodyR*.8; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); buildBodyPath(w.segs,z); ctx.stroke();
    ctx.lineDashOffset=CFG.SEG_GAP*z*1.8;
    ctx.strokeStyle='rgba(0,0,0,0.14)';
    ctx.beginPath(); buildBodyPath(w.segs,z); ctx.stroke();
    ctx.setLineDash([]);
  }

  // 5. Top highlight (thin lighter strip for 3D shine)
  ctx.strokeStyle='rgba(255,255,255,0.18)';
  ctx.lineWidth=bodyR*.6; ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath(); buildBodyPath(w.segs,z); ctx.stroke();

  // ── HEAD ──
  const hs=w.segs[0];
  if(vis(hs.x,hs.y,headR+8)){
    const hp=w2s(hs.x,hs.y);

    // Head glow
    if(w.boosting){
      ctx.shadowBlur=headR*2.5; ctx.shadowColor=w.colGlow;
    } else if(w.isPlayer){
      ctx.shadowBlur=headR*1.2; ctx.shadowColor=w.colGlow;
    }
    if(shield){ ctx.shadowBlur=headR*2; ctx.shadowColor='#4488ff'; }

    // Head dark outline
    ctx.fillStyle=darken(w.colHead,35);
    ctx.beginPath(); ctx.arc(hp.x,hp.y,headR+2.5*z,0,Math.PI*2); ctx.fill();

    // Head base
    const hg=ctx.createRadialGradient(hp.x-headR*.3,hp.y-headR*.35,0,hp.x,hp.y,headR*1.1);
    hg.addColorStop(0,lighten(w.colHead,28));
    hg.addColorStop(0.55,w.colHead);
    hg.addColorStop(1,darken(w.colHead,22));
    ctx.fillStyle=hg;
    ctx.beginPath(); ctx.arc(hp.x,hp.y,headR,0,Math.PI*2); ctx.fill();
    ctx.shadowBlur=0;

    // Top highlight on head
    const hhi=ctx.createRadialGradient(hp.x-headR*.25,hp.y-headR*.28,0,hp.x,hp.y,headR*.8);
    hhi.addColorStop(0,'rgba(255,255,255,0.32)');
    hhi.addColorStop(1,'transparent');
    ctx.fillStyle=hhi;
    ctx.beginPath(); ctx.arc(hp.x,hp.y,headR,0,Math.PI*2); ctx.fill();

    // Shield ring
    if(shield){
      ctx.strokeStyle='rgba(68,136,255,0.75)';
      ctx.lineWidth=2.5*z;
      ctx.shadowBlur=14; ctx.shadowColor='#4488ff';
      ctx.beginPath(); ctx.arc(hp.x,hp.y,headR+5*z,0,Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0;
    }

    // ── TONGUE ──
    if(!w.boosting){
      const tlen=headR*(0.7+w.tongueOut*0.5);
      const tx=hp.x+Math.cos(w.dir)*headR*.85;
      const ty=hp.y+Math.sin(w.dir)*headR*.85;
      const tx2=hp.x+Math.cos(w.dir)*(headR*.85+tlen);
      const ty2=hp.y+Math.sin(w.dir)*(headR*.85+tlen);
      const fork=headR*.28;
      const perp=w.dir+Math.PI/2;
      ctx.strokeStyle='#ff2244'; ctx.lineWidth=1.5*z; ctx.lineCap='round';
      ctx.beginPath();
      ctx.moveTo(tx,ty); ctx.lineTo(tx2,ty2); ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(tx2,ty2);
      ctx.lineTo(tx2+Math.cos(w.dir+.4)*fork,ty2+Math.sin(w.dir+.4)*fork);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(tx2,ty2);
      ctx.lineTo(tx2+Math.cos(w.dir-.4)*fork,ty2+Math.sin(w.dir-.4)*fork);
      ctx.stroke();
    }

    // ── EYES ──
    const ep=w.dir+Math.PI/2;
    for(const side of [1,-1]){
      const ex=hp.x+Math.cos(w.dir)*headR*.42+Math.cos(ep)*headR*.42*side;
      const ey=hp.y+Math.sin(w.dir)*headR*.42+Math.sin(ep)*headR*.42*side;
      const er=headR*.32;

      // Eye white with subtle shading
      const ewg=ctx.createRadialGradient(ex-er*.2,ey-er*.25,0,ex,ey,er);
      ewg.addColorStop(0,'#ffffff'); ewg.addColorStop(1,'#ddeeff');
      ctx.fillStyle=ewg;
      ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.fill();

      // Eye outline
      ctx.strokeStyle='rgba(0,0,0,0.4)'; ctx.lineWidth=1*z;
      ctx.beginPath(); ctx.arc(ex,ey,er,0,Math.PI*2); ctx.stroke();

      // Pupil
      const px2=ex+Math.cos(w.dir)*er*.42, py2=ey+Math.sin(w.dir)*er*.42;
      ctx.fillStyle='#111122';
      ctx.beginPath(); ctx.arc(px2,py2,er*.56,0,Math.PI*2); ctx.fill();

      // Pupil shine highlight
      ctx.fillStyle='rgba(255,255,255,0.72)';
      ctx.beginPath(); ctx.arc(px2-er*.22,py2-er*.22,er*.2,0,Math.PI*2); ctx.fill();

      // Small second highlight
      ctx.fillStyle='rgba(255,255,255,0.38)';
      ctx.beginPath(); ctx.arc(px2+er*.15,py2+er*.1,er*.1,0,Math.PI*2); ctx.fill();
    }

    // ── NAME TAG ──
    if(G.zoom>0.4){
      ctx.font=`bold ${Math.max(9,Math.round(12*G.zoom))}px sans-serif`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      const tw=ctx.measureText(w.name).width;
      const ty2=hp.y-headR-19*z;
      ctx.fillStyle='rgba(0,0,0,0.62)';
      ctx.beginPath(); ctx.roundRect(hp.x-tw/2-7,ty2-9,tw+14,18,5); ctx.fill();
      ctx.fillStyle='#ffffff';
      ctx.fillText(w.name,hp.x,ty2);
    }
  }

  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════
// BOOST TRAIL
// ═══════════════════════════════════════════════════════════
function drawBoostTrail(){
  const w=G.player;
  if(!w||!w.alive||!w.boosting||w.segs.length<5) return;
  const maxTrail=Math.min(22,w.segs.length);
  ctx.save();
  for(let i=1;i<maxTrail;i++){
    const s=w.segs[i], p=w2s(s.x,s.y), t=1-i/maxTrail;
    ctx.globalAlpha=t*.55;
    ctx.shadowBlur=14; ctx.shadowColor=w.colGlow;
    ctx.fillStyle=w.colGlow;
    ctx.beginPath(); ctx.arc(p.x,p.y,CFG.SEG_R*.55*G.zoom*t,0,Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur=0; ctx.globalAlpha=1;
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// PARTICLES
// ═══════════════════════════════════════════════════════════
function drawParticles(){
  for(const p of G.particles){
    if(!vis(p.x,p.y,15)) continue;
    const pt=w2s(p.x,p.y);
    ctx.globalAlpha=p.life*.9;
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(pt.x,pt.y,p.r*G.zoom,0,Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha=1;
}

// ═══════════════════════════════════════════════════════════
// MINIMAP
// ═══════════════════════════════════════════════════════════
function drawMinimap(){
  const W=mmc.width, sc=W/CFG.ARENA;
  mmx.clearRect(0,0,W,W);
  mmx.fillStyle='rgba(6,10,22,.88)';
  mmx.beginPath(); mmx.arc(W/2,W/2,W/2,0,Math.PI*2); mmx.fill();
  mmx.fillStyle='rgba(255,255,255,0.12)';
  for(let i=0;i<G.food.length;i+=9) mmx.fillRect(G.food[i].x*sc-.6,G.food[i].y*sc-.6,1.4,1.4);
  for(const b of G.bonuses){
    if(b.dead)continue; mmx.fillStyle=b.color;
    mmx.fillRect(b.x*sc-1.5,b.y*sc-1.5,4,4);
  }
  for(const pu of G.powerups){
    if(pu.dead)continue; mmx.fillStyle=CFG.PU_COLOR[pu.type];
    mmx.beginPath(); mmx.arc(pu.x*sc,pu.y*sc,3,0,Math.PI*2); mmx.fill();
  }
  for(const b of G.bots){
    if(!b||!b.alive)continue;
    const hd=H(b); mmx.fillStyle=b.colHead;
    mmx.beginPath(); mmx.arc(hd.x*sc,hd.y*sc,2.5,0,Math.PI*2); mmx.fill();
  }
  if(G.player&&G.player.alive){
    const hd=H(G.player);
    mmx.fillStyle='#ffffff';
    mmx.beginPath(); mmx.arc(hd.x*sc,hd.y*sc,4.5,0,Math.PI*2); mmx.fill();
    const vw=cv.width/G.zoom*sc, vh=cv.height/G.zoom*sc;
    mmx.strokeStyle='rgba(255,255,255,.22)'; mmx.lineWidth=1;
    mmx.strokeRect(G.camX*sc-vw/2,G.camY*sc-vh/2,vw,vh);
  }
  mmx.globalCompositeOperation='destination-in';
  mmx.beginPath(); mmx.arc(W/2,W/2,W/2,0,Math.PI*2); mmx.fill();
  mmx.globalCompositeOperation='source-over';
}

// ═══════════════════════════════════════════════════════════
// HUD
// ═══════════════════════════════════════════════════════════
let hudThrottle=0;
function updateHUD(){
  if(!G.player) return;
  hudThrottle++;
  document.getElementById('hudScore').textContent=G.score.toLocaleString();
  document.getElementById('hudBoost').style.width=(G.player.boostE/CFG.MAX_BOOST*100)+'%';
  document.getElementById('hudLen').textContent='Length: '+L(G.player);
  document.getElementById('hudName').textContent=G.player.name;
  if(hudThrottle%10===0){
    const all=[G.player,...G.bots].filter(w=>w&&w.alive);
    all.sort((a,b)=>b.score-a.score);
    const rank=all.findIndex(w=>w.isPlayer)+1;
    document.getElementById('hudRank').textContent='#'+rank;
    const lb=document.getElementById('lbList'); lb.innerHTML='';
    all.slice(0,10).forEach((w,i)=>{
      const d=document.createElement('div');
      d.className='lb-row'+(w.isPlayer?' me':'');
      d.innerHTML=`<span class="lb-n">${i+1}</span>
        <span class="lb-dot" style="background:${w.colHead}"></span>
        <span class="lb-nm">${w.name}</span>
        <span class="lb-sc">${w.score}</span>`;
      lb.appendChild(d);
    });
  }
  if(hudThrottle%5===0){
    const now=Date.now(), ph=document.getElementById('puHud');
    ph.innerHTML='';
    for(const [type,info] of Object.entries(G.player.pups)){
      if(!info||now>=info.end) continue;
      const pct=(info.end-now)/info.total*100;
      const d=document.createElement('div'); d.className='pu-pill';
      d.innerHTML=`<span class="pu-ico">${CFG.PU_EMOJI[type]}</span>
        <div><div class="pu-nm">${CFG.PU_NAME[type]}</div>
        <div class="pu-bar"><div class="pu-fill" style="width:${pct}%;background:${CFG.PU_COLOR[type]}"></div></div></div>`;
      ph.appendChild(d);
    }
  }
  if(hudThrottle%3===0) drawMinimap();
}

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render(){
  ctx.clearRect(0,0,cv.width,cv.height);
  drawBg();
  drawFood();
  drawBoostTrail();
  for(const b of G.bots) if(b&&b.alive) drawWorm(b);
  if(G.player&&G.player.alive) drawWorm(G.player);
  drawParticles();
}

// ═══════════════════════════════════════════════════════════
// GAME LOOP
// ═══════════════════════════════════════════════════════════
let raf=null;
function loop(ts){
  if(G.phase!=='playing') return;
  G.dt=Math.min(ts-G.lastT,50); G.lastT=ts; G.frame++; G.t=ts;
  if(G.player&&G.player.alive){
    const wp=s2w(inp.mx,inp.my), hd=H(G.player);
    G.player.tdir=Math.atan2(wp.y-hd.y,wp.x-hd.x);
    G.player.boosting=inp.boost&&G.player.boostE>0;
  }
  if(G.player&&G.player.alive) tickWorm(G.player,G.dt);
  for(const b of G.bots) if(b&&b.alive){ aiStep(b,G.dt); tickWorm(b,G.dt); }
  collide();
  for(let i=G.particles.length-1;i>=0;i--){
    const p=G.particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vx*=.92; p.vy*=.92; p.life-=p.decay;
    if(p.life<=0) G.particles.splice(i,1);
  }
  if(G.shake>0) G.shake*=.82;
  updateCam(); render(); updateHUD();
  raf=requestAnimationFrame(loop);
}

// ═══════════════════════════════════════════════════════════
// GAME CONTROL
// ═══════════════════════════════════════════════════════════
function show(id){
  document.querySelectorAll('.sc').forEach(s=>s.classList.add('hide'));
  if(id) document.getElementById(id)?.classList.remove('hide');
}
function startGame(){
  G.player=mkWorm(G.pName||'Player',G.pColor||CFG.PALETTES[0],true);
  G.bots=[];
  for(let i=0;i<CFG.BOTS;i++)
    G.bots.push(mkWorm(CFG.BNAMES[rndI(0,CFG.BNAMES.length-1)],CFG.PALETTES[rndI(0,CFG.PALETTES.length-1)],false));
  G.score=0; G.shake=0; G.particles=[]; G.frame=0; G.deathCause='';
  G.bgrid=new Grid(); G.fgrid=new Grid();
  initWorld();
  const hd=H(G.player);
  G.camX=hd.x; G.camY=hd.y; G.zoom=1;
  G.phase='playing';
  show(null);
  document.getElementById('hud').classList.remove('hide');
  if(raf) cancelAnimationFrame(raf);
  G.lastT=performance.now();
  raf=requestAnimationFrame(loop);
}
function pause(){
  G.phase='paused'; if(raf){cancelAnimationFrame(raf);raf=null;} show('sPause');
}
function resume(){
  G.phase='playing'; show(null); G.lastT=performance.now(); raf=requestAnimationFrame(loop);
}
function endGame(){
  if(G.phase==='over') return;
  G.phase='over'; if(raf){cancelAnimationFrame(raf);raf=null;}
  if(G.score>G.hs){ G.hs=G.score; localStorage.setItem('wz2_hs',G.hs); }
  document.getElementById('ovScore').textContent=G.score;
  document.getElementById('ovLen').textContent=G.player?L(G.player):0;
  const all=[G.player,...G.bots].filter(w=>w&&w.alive);
  all.sort((a,b)=>b.score-a.score);
  const rank=all.findIndex(w=>w.isPlayer)+1;
  document.getElementById('ovRank').textContent='#'+(rank<1?all.length:rank);
  document.getElementById('ovCause').textContent=G.deathCause||'Eliminated';
  document.getElementById('hud').classList.add('hide');
  show('sOver');
}

// ═══════════════════════════════════════════════════════════
// UI SETUP
// ═══════════════════════════════════════════════════════════
function buildColorPicker(){
  const el=document.getElementById('cpick'); el.innerHTML='';
  CFG.PALETTES.forEach((p,i)=>{
    const b=document.createElement('div'); b.className='csw'+(i===0?' on':'');
    b.style.background=p.h; b.style.color=p.h;
    b.onclick=()=>{
      G.pColor=p;
      document.querySelectorAll('.csw').forEach(x=>x.classList.remove('on'));
      b.classList.add('on');
    };
    el.appendChild(b);
  });
}
buildColorPicker();
document.getElementById('hsVal').textContent=G.hs;
document.getElementById('nameIn').addEventListener('input',e=>{ G.pName=e.target.value||'Player'; });
document.getElementById('btnPlay').onclick=()=>{ G.pName=document.getElementById('nameIn').value||'Player'; startGame(); };
document.getElementById('btnAgain').onclick=startGame;
document.getElementById('btnMenu').onclick=()=>{ G.phase='menu'; show('sStart'); document.getElementById('hud').classList.add('hide'); };
document.getElementById('btnResume').onclick=resume;
document.getElementById('btnRestart').onclick=startGame;
document.getElementById('btnBack').onclick=()=>{ G.phase='menu'; show('sStart'); document.getElementById('hud').classList.add('hide'); };
</script>
